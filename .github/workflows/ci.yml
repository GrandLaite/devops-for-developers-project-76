name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and ansible-lint
        run: pip install ansible ansible-lint

      - name: Install Galaxy roles and collections
        run: make install

      - name: Provide Ansible Vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.txt

      - name: Playbook syntax check
        run: ansible-playbook -i inventory.ini playbook.yml --syntax-check

      - name: Ansible lint
        run: ansible-lint
        continue-on-error: true
